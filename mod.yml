title: Pay to Win
description: PUT ABOVE SEED. Munny Pouches give random amount of Munny between 500 and 3000. Console with F2 prints amount of munny given. Enemies never drop munny. Some bosses give a Munny Pouch. See README for more info.
assets:
  - name: icon.png
    method: copy
    source:
      - name: icon.png
  # modified GoA munny pouches
