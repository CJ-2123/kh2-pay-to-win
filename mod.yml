    method: copy
    source:
      - name: F266B00B GoA Rom.lua
  # enemies never drop munny orbs
  - name: 00battle.bin
    method: binarc
    source:
      - name: przt
        type: list
        method: listpatch
        source:
          - name: przt.yml
            type: przt
  # some bosses give a munny pouch
  - method: binarc
